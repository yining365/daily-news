name: 阿宁日报 V3 (备份)

on:
  schedule:
    - cron: "30 1 * * *"  # 9:30 AM CST，服务器 8:00 没跑成功时补位
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if today's brief already exists
        id: check
        run: |
          TODAY=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          if [ -f "docs/$TODAY.html" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Today's brief already generated by server, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch news and generate daily brief
        if: steps.check.outputs.exists == 'false'
        run: |
          python scripts/fetch_news.py
        env:
          TZ: Asia/Shanghai
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.exists == 'false'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
