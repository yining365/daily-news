name: 阿宁日报 V2

on:
  schedule:
    - cron: "15 0 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch news and generate daily brief
        run: |
          python scripts/fetch_news.py
        env:
          TZ: Asia/Shanghai
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}

      - name: Send Bark notification
        if: success()
        continue-on-error: true
        run: |
          python scripts/notify_bark.py
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          GITHUB_PAGES_URL: ${{ github.event.repository.html_url }}

      - name: Alert on failure
        if: failure()
        continue-on-error: true
        run: |
          curl -s "https://api.day.app/${{ secrets.BARK_KEY }}/阿宁日报生成失败/请检查GitHub Actions日志" || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
